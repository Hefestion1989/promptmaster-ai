<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptMaster - Optimizador de Prompts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#14b8a6', // Teal 500 - Un poco más oscuro para mejor contraste en texto
              primaryLight: '#2dd4bf', // Teal 400 - Para brillos y bordes
              secondary: '#0ea5e9', // Sky 500
              dark: '#09090b', // Zinc 950 - Fondo principal casi negro
              card: '#18181b', // Zinc 900 - Fondo de tarjetas
              border: '#27272a', // Zinc 800
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #09090b;
        color: #e4e4e7; /* Zinc 200 */
      }
      .gradient-text {
        background: linear-gradient(to right, #2dd4bf, #0ea5e9);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>

    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
